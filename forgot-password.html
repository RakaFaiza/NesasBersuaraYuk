<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password - Bersuara Yuk</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h2>🔑 Lupa Password</h2>
    <p style="color: #666;">Masukkan email terdaftar, kami kirim link reset</p>
    <form id="forgotForm">
      <input type="email" id="email" placeholder="Email" required>
      <button type="submit">Kirim Link Reset</button>
    </form>
    <p><a href="index.html">Kembali ke Login</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      // Gunakan origin untuk development, ganti dengan domain publik jika production
      const redirectUrl = window.location.origin + '/update-password.html';
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: redirectUrl
      });
      if (error) alert('Gagal: ' + error.message);
      else alert('Link reset telah dikirim ke email Anda. Periksa kotak masuk/spam.');
    });
  </script>
</body>
</html>

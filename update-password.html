<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Bersuara Yuk</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h2>🔒 Password Baru</h2>
    <form id="updateForm">
      <input type="password" id="newPassword" placeholder="Password Baru" required minlength="6">
      <input type="password" id="confirmPassword" placeholder="Konfirmasi Password" required minlength="6">
      <button type="submit">Simpan</button>
    </form>
    <p><a href="index.html">Login</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    document.getElementById('updateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const p1 = document.getElementById('newPassword').value;
      const p2 = document.getElementById('confirmPassword').value;
      if (p1 !== p2) { alert('Password tidak cocok'); return; }
      const { error } = await supabase.auth.updateUser({ password: p1 });
      if (error) alert('Gagal: ' + error.message);
      else {
        alert('Password berhasil diubah! Silakan login.');
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
